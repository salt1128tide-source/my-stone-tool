<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>あなただけの石を見つけよう</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      max-width: 640px;
      width: 100%;
    }

    h1 {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 48px;
      letter-spacing: 0.05em;
    }

    /* 進捗バー */
    .progress-bar {
      width: 100%;
      height: 2px;
      background: #222;
      border-radius: 2px;
      margin-bottom: 48px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #888, #fff);
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* 質問カード */
    .question-card {
      display: none;
      animation: fadeIn 0.5s ease;
    }
    .question-card.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .question-number {
      font-size: 0.75rem;
      color: #666;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }

    .question-text {
      font-size: 1.2rem;
      font-weight: 300;
      line-height: 1.7;
      margin-bottom: 32px;
      color: #eee;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option-btn {
      background: transparent;
      border: 1px solid #333;
      color: #ccc;
      padding: 16px 20px;
      text-align: left;
      font-size: 0.95rem;
      font-weight: 300;
      line-height: 1.5;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s ease;
      letter-spacing: 0.03em;
    }

    .option-btn:hover {
      border-color: #888;
      color: #fff;
      background: #111;
    }

    .option-btn.selected {
      border-color: #fff;
      color: #fff;
      background: #1a1a1a;
    }

    /* 結果画面 */
    #result {
      display: none;
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    .result-title {
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 0.15em;
      margin-bottom: 24px;
    }

    .stone-image {
      width: 100%;
      max-width: 480px;
      border-radius: 4px;
      margin: 0 auto 32px;
      display: block;
    }

    .stone-type {
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      color: #fff;
    }

    .stone-desc {
      font-size: 0.9rem;
      color: #999;
      line-height: 1.8;
      margin-bottom: 40px;
      font-weight: 300;
    }

    .download-btn {
      display: inline-block;
      border: 1px solid #555;
      color: #ccc;
      padding: 14px 40px;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-radius: 4px;
      text-decoration: none;
      transition: all 0.2s ease;
      background: transparent;
    }

    .download-btn:hover {
      border-color: #fff;
      color: #fff;
    }

    .retry-btn {
      display: block;
      margin: 16px auto 0;
      background: none;
      border: none;
      color: #555;
      font-size: 0.8rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    .retry-btn:hover { color: #999; }
  </style>
</head>
<body>
<div class="container">
  <h1>YOUR STONE</h1>
  <p class="subtitle">5つの質問に答えて、あなただけの石を見つけよう</p>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div id="questions">

    <!-- Q1 -->
    <div class="question-card active" id="q0">
      <p class="question-number">Q1 / 5</p>
      <p class="question-text">あなたが一番ワクワクする瞬間はどれ？</p>
      <div class="options">
        <button class="option-btn" onclick="answer(0,0)">新しいアイデアを思いついた時</button>
        <button class="option-btn" onclick="answer(0,1)">誰かの役に立てた時</button>
        <button class="option-btn" onclick="answer(0,2)">難しい問題を解けた時</button>
        <button class="option-btn" onclick="answer(0,3)">仲間と一緒に何かを作り上げた時</button>
      </div>
    </div>

    <!-- Q2 -->
    <div class="question-card" id="q1">
      <p class="question-number">Q2 / 5</p>
      <p class="question-text">友達からどんな人だと言われることが多い？</p>
      <div class="options">
        <button class="option-btn" onclick="answer(1,0)">頼りになる・安定感がある</button>
        <button class="option-btn" onclick="answer(1,1)">発想が面白い・ユニーク</button>
        <button class="option-btn" onclick="answer(1,2)">話しやすい・聞き上手</button>
        <button class="option-btn" onclick="answer(1,3)">エネルギッシュ・引っ張ってくれる</button>
      </div>
    </div>

    <!-- Q3 -->
    <div class="question-card" id="q2">
      <p class="question-number">Q3 / 5</p>
      <p class="question-text">仕事で大事にしたいことは？</p>
      <div class="options">
        <button class="option-btn" onclick="answer(2,0)">社会や人への貢献</button>
        <button class="option-btn" onclick="answer(2,1)">自分の成長・スキルアップ</button>
        <button class="option-btn" onclick="answer(2,2)">新しいものを生み出すこと</button>
        <button class="option-btn" onclick="answer(2,3)">チームワーク・人とのつながり</button>
      </div>
    </div>

    <!-- Q4 -->
    <div class="question-card" id="q3">
      <p class="question-number">Q4 / 5</p>
      <p class="question-text">知らないことに出会った時、あなたは？</p>
      <div class="options">
        <button class="option-btn" onclick="answer(3,0)">とにかく自分で調べる</button>
        <button class="option-btn" onclick="answer(3,1)">詳しい人にすぐ聞く</button>
        <button class="option-btn" onclick="answer(3,2)">まずやってみる</button>
        <button class="option-btn" onclick="answer(3,3)">じっくり考えてから動く</button>
      </div>
    </div>

    <!-- Q5 -->
    <div class="question-card" id="q4">
      <p class="question-number">Q5 / 5</p>
      <p class="question-text">あなたの原動力は？</p>
      <div class="options">
        <button class="option-btn" onclick="answer(4,0)">「誰かに認められたい」という気持ち</button>
        <button class="option-btn" onclick="answer(4,1)">「世の中を変えたい」という想い</button>
        <button class="option-btn" onclick="answer(4,2)">「自分が楽しいかどうか」</button>
        <button class="option-btn" onclick="answer(4,3)">「仲間と達成する喜び」</button>
      </div>
    </div>

  </div>

  <!-- 結果 -->
  <div id="result">
    <p class="result-title">YOUR STONE</p>
    <img class="stone-image" id="stoneImg" src="" alt="あなたの石" />
    <p class="stone-type" id="stoneType"></p>
    <p class="stone-desc" id="stoneDesc"></p>
    <a class="download-btn" id="downloadBtn" href="#" download>画像をダウンロード</a>
    <button class="retry-btn" onclick="retry()">もう一度やり直す</button>
  </div>
</div>

<script>
  // ==============================
  // 石の定義（10種類）
  // stone-type名・説明・画像ファイル名を自由に編集してください
  // ==============================
  const stones = [
    {
      type: "開拓者の石",
      desc: "既存の枠にとらわれず、自ら道を切り拓いていくあなた。\nその好奇心と行動力が、新しい世界を生み出す。",
      file: "stone01.jpg"
    },
    {
      type: "共鳴者の石",
      desc: "人の気持ちに寄り添い、チームに温もりをもたらすあなた。\nその共感力が、周りの人を動かす力になる。",
      file: "stone02.jpg"
    },
    {
      type: "探究者の石",
      desc: "物事の本質を深く追い求めるあなた。\nその洞察力と粘り強さが、複雑な問題を解き明かす。",
      file: "stone03.jpg"
    },
    {
      type: "構築者の石",
      desc: "着実に積み上げることで、大きなものを生み出すあなた。\nその安定感と責任感が、チームの土台となる。",
      file: "stone04.jpg"
    },
    {
      type: "触媒の石",
      desc: "周りの人やアイデアをつなぎ、化学反応を起こすあなた。\nその存在が、場のエネルギーを変える。",
      file: "stone05.jpg"
    },
    {
      type: "革新者の石",
      desc: "当たり前を疑い、新しい視点をもたらすあなた。\nそのユニークな発想が、世界を面白くする。",
      file: "stone06.jpg"
    },
    {
      type: "羅針盤の石",
      desc: "方向性を示し、チームを正しい方向へ導くあなた。\nその判断力と意志が、みんなの道標になる。",
      file: "stone07.jpg"
    },
    {
      type: "根の石",
      desc: "見えないところで支え、全体を安定させるあなた。\nその誠実さと粘り強さが、チームの力になる。",
      file: "stone08.jpg"
    },
    {
      type: "光の石",
      desc: "明るさとエネルギーで周りを照らすあなた。\nその前向きな姿勢が、チームに活力を与える。",
      file: "stone09.jpg"
    },
    {
      type: "対話者の石",
      desc: "言葉と傾聴で、人と人の間に橋を架けるあなた。\nその誠実なコミュニケーションが、信頼を生む。",
      file: "stone10.jpg"
    }
  ];

  // ==============================
  // 回答→石のマッピング（スコア方式）
  // 各質問の回答(0〜3)が、どの石タイプに近いかを定義
  // ==============================
  // 各回答で加算されるstone indexのリスト
  const mapping = [
    // Q1: ワクワクする瞬間
    [[0,5], [1,4], [2,7], [3,4]], // 0:アイデア→革新/開拓, 1:役立つ→共鳴/触媒, 2:問題解決→探究/根, 3:仲間→触媒/共鳴
    // Q2: 友達からどう言われる
    [[3,7], [0,5], [1,9], [4,8]], // 0:頼りになる→構築/根, 1:発想→開拓/革新, 2:聞き上手→共鳴/対話, 3:エネルギッシュ→触媒/光
    // Q3: 仕事で大事なこと
    [[1,4], [2,0], [5,0], [4,1]], // 0:貢献→共鳴/触媒, 1:成長→探究/開拓, 2:創造→革新/開拓, 3:チーム→触媒/共鳴
    // Q4: 知らないことへの対処
    [[2,0], [9,1], [0,5], [6,3]], // 0:自分で調べる→探究/開拓, 1:すぐ聞く→対話/共鳴, 2:まずやる→開拓/革新, 3:考える→羅針盤/構築
    // Q5: 原動力
    [[6,8], [0,5], [2,5], [1,4]]  // 0:認められたい→羅針盤/光, 1:世界を変えたい→開拓/革新, 2:楽しいかどうか→探究/革新, 3:仲間と達成→共鳴/触媒
  ];

  let answers = [];
  let current = 0;

  function answer(qIndex, optIndex) {
    // ボタンのハイライト
    const btns = document.querySelectorAll(`#q${qIndex} .option-btn`);
    btns.forEach(b => b.classList.remove('selected'));
    btns[optIndex].classList.add('selected');

    answers[qIndex] = optIndex;

    setTimeout(() => {
      if (qIndex < 4) {
        document.getElementById(`q${qIndex}`).classList.remove('active');
        document.getElementById(`q${qIndex + 1}`).classList.add('active');
        current = qIndex + 1;
        updateProgress(qIndex + 1);
      } else {
        updateProgress(5);
        showResult();
      }
    }, 400);
  }

  function updateProgress(step) {
    document.getElementById('progressFill').style.width = (step / 5 * 100) + '%';
  }

  function showResult() {
    // スコア集計
    const score = new Array(10).fill(0);
    answers.forEach((ans, q) => {
      mapping[q][ans].forEach(idx => score[idx]++);
    });

    // 最高スコアの石を選ぶ（同点の場合は最初のもの）
    let maxScore = -1;
    let stoneIndex = 0;
    score.forEach((s, i) => {
      if (s > maxScore) { maxScore = s; stoneIndex = i; }
    });

    const stone = stones[stoneIndex];

    // 結果表示
    document.getElementById('questions').style.display = 'none';
    const result = document.getElementById('result');
    result.style.display = 'block';

    document.getElementById('stoneImg').src = stone.file;
    document.getElementById('stoneType').textContent = stone.type;
    document.getElementById('stoneDesc').textContent = stone.desc;
    document.getElementById('downloadBtn').href = stone.file;
    document.getElementById('downloadBtn').download = stone.file;
  }

  function retry() {
    answers = [];
    current = 0;
    document.getElementById('result').style.display = 'none';
    document.getElementById('questions').style.display = 'block';
    document.querySelectorAll('.question-card').forEach((el, i) => {
      el.classList.toggle('active', i === 0);
    });
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    updateProgress(0);
  }
</script>
</body>
</html>
